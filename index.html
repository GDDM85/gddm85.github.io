<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h1 {
            font-size: 48px;
            margin-top: 20%;
            opacity: 0;
            transition: opacity 3s ease-in;
            -webkit-transition: opacity 3s ease-in; /* Safari/iOS fallback */
            will-change: opacity;
        }
        h1.visible {
            opacity: 1;
        }

        h2 {
            font-size: 20px;
            margin-top: 1rem;
            opacity: 0;
            transition: opacity 2s ease-in;
            -webkit-transition: opacity 2s ease-in;
            will-change: opacity;
        }
        h2.visible {
            opacity: 1;
        }

        /* Respect users who prefer reduced motion */
        @media (prefers-reduced-motion: reduce) {
            h1, h2 {
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <h1 id="headline">Coming Soon</h1>
    <h2 id="subhead">Daniel McDermott</h2>
    <h2 id="subhead">Lead Developer</h2>
    <p>
Delivering scalable software across web, mobile, and enterprise platforms.
Portfolio and case studies coming soon. </p>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const h1 = document.getElementById('headline');
            const h2 = document.getElementById('subhead');

            // Respect reduced motion: show both immediately
            if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                h1.style.opacity = '1';
                h2.style.opacity = '1';
                return;
            }

            // Function that triggers the h2 reveal
            function revealH2() {
                if (!h2.classList.contains('visible')) {
                    h2.classList.add('visible');
                }
            }

            // Listen for h1 transition end (once) and then reveal h2.
            // Use a fallback timeout slightly longer than the h1 transition duration in case transitionend doesn't fire.
            const H1_TRANSITION_MS = 3000; // must match the CSS duration for h1
            let transitionHandled = false;

            function onH1TransitionEnd(e) {
                // Only respond to opacity transition events
                if (e && e.propertyName && e.propertyName !== 'opacity') return;
                if (transitionHandled) return;
                transitionHandled = true;
                revealH2();
            }

            h1.addEventListener('transitionend', onH1TransitionEnd, { once: true });

            // Fallback: ensure h2 shows even if transitionend doesn't fire
            setTimeout(function() {
                if (!transitionHandled) {
                    transitionHandled = true;
                    revealH2();
                }
            }, H1_TRANSITION_MS + 200);

            // Ensure the initial style is painted before adding the class so the transition runs.
            // Using double requestAnimationFrame is a robust, widely-used pattern.
            if (window.requestAnimationFrame) {
                requestAnimationFrame(function() {
                    requestAnimationFrame(function() {
                        h1.classList.add('visible');
                    });
                });
                // fallback in case RAF is not sufficient on some devices
                setTimeout(function() {
                    if (!h1.classList.contains('visible')) h1.classList.add('visible');
                }, 50);
            } else {
                // Older fallback
                setTimeout(function() {
                    h1.classList.add('visible');
                }, 50);
            }
        });
    </script>
</body>
</html>
